name: "Lint & Style Check"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-formatting:
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        task:
          - 02.UTF-encoder

    steps:
      - name: Получение кода и actions
        uses: actions/checkout@v4

      - name: Инсталляция инструментов
        uses: ./.github/actions/install-prerequisites

      - name: Стиль кодирования
        uses: per1234/artistic-style-action@v1
        with:
          options-file-path: astyle.ini
          target-paths: "- ./${{ matrix.task }}/"
          name-patterns: |
            - '*.cpp'
            - '*.h'

      - name: compile_commands.json для clang-tidy
        run: |
          pushd "${{ matrix.task }}"
          bear -- make utf_codec.d.o utf_codec_test.d.o
          cp compile_commands.json ..
          popd

      - name: Статический анализ clang-tidy
        run: |
          pushd "${{ matrix.task }}"
          make tidy
          popd
